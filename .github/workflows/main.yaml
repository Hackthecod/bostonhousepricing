#your work flow name
name: deploy-to-render
# Run this workflow on push to the main branch
on:
  push:
    branches:
      - main
# What jobs to run
jobs:
  # This job will deploy the app to Render
  build-and-deploy:
    # The type of machine to run on
    runs-on: ubuntu-latest
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2
      # Deploy to Render using the render-actions/deploy action
      - name: Deploy to Render
        uses: render-actions/deploy@v1
        with:
          api_key: ${{ https://api.render.com/deploy/srv-d74kj28ule4c73f4imr0?key=7dixaiB2nLY }}
          service_id: ${{ secrets.RENDER_SERVICE_ID }}